name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      # Create a stable signing keystore once and commit it, so every build shares the
      # same signature (required for in-place upgrades). Reused on later runs.
      - name: Ensure signing keystore
        run: |
          if [ ! -f app/matteo-debug.keystore ]; then
            keytool -genkeypair -v \
              -keystore app/matteo-debug.keystore \
              -storepass matteo123 -keypass matteo123 -alias matteo \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Matteo Games, O=Matteo, C=PL"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -f app/matteo-debug.keystore
            git commit -m "Add stable signing keystore [skip ci]"
            git push origin "HEAD:${{ github.ref_name }}"
          fi

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install SDK packages
        run: sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: '8.9'

      - name: Build debug APK
        env:
          VERSION_CODE: ${{ github.run_number }}
        run: gradle :app:assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v5
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

  # Publishes the built APK as a GitHub Release, but only after `build` succeeds
  # and only for pushes to main (or a manual run). PRs still build without releasing.
  release:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download built APK
        uses: actions/download-artifact@v5
        with:
          name: app-debug
          path: apk

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v1.0.${{ github.run_number }}"
          cp apk/app-debug.apk "MatteoGames-${TAG}.apk"
          gh release create "$TAG" "MatteoGames-${TAG}.apk" \
            --repo "${{ github.repository }}" \
            --title "Matteo Games ${TAG}" \
            --notes "Automated build from commit ${{ github.sha }}." \
            --latest
