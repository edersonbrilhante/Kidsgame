name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install SDK packages
        run: sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: '8.9'

      - name: Fetch Twemoji icons
        run: python3 scripts/fetch_twemoji.py

      - name: Build debug APK
        env:
          VERSION_CODE: ${{ github.run_number }}
        run: gradle :app:assembleDebug --no-daemon

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk MatteoGames.apk

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: MatteoGames-debug
          path: MatteoGames.apk
          if-no-files-found: error

  # Publishes the built APK as a GitHub Release, but only after `build` succeeds
  # and only for pushes to main (or a manual run). PRs still build without releasing.
  release:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download built APK
        uses: actions/download-artifact@v8
        with:
          name: MatteoGames-debug
          path: apk

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v1.0.${{ github.run_number }}"
          cp apk/MatteoGames.apk "MatteoGames-${TAG}.apk"
          gh release create "$TAG" "MatteoGames-${TAG}.apk" \
            --repo "${{ github.repository }}" \
            --title "Matteo Games ${TAG}" \
            --notes "Automated build from commit ${{ github.sha }}." \
            --latest

      - name: Prune old releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Keep only the newest release/tag; delete the rest.
          gh release list --repo "${{ github.repository }}" --json tagName,createdAt \
            --jq 'sort_by(.createdAt) | reverse | .[1:] | .[].tagName' \
          | while read -r old; do
              [ -n "$old" ] && gh release delete "$old" --repo "${{ github.repository }}" --cleanup-tag --yes
            done
