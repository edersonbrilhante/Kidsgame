name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Build debug APK
        run: gradle :app:assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

  # Publishes the built APK as a GitHub Release, but only after `build` succeeds
  # and only for pushes to main (or a manual run). PRs still build without releasing.
  release:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download built APK
        uses: actions/download-artifact@v4
        with:
          name: app-debug
          path: apk

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v1.0.${{ github.run_number }}"
          cp apk/app-debug.apk "KidsPuzzle-${TAG}.apk"
          gh release create "$TAG" "KidsPuzzle-${TAG}.apk" \
            --repo "${{ github.repository }}" \
            --title "Kids Puzzle ${TAG}" \
            --notes "Automated build from commit ${{ github.sha }}." \
            --latest
